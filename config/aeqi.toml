[aeqi]
name = "emperor-system"
data_dir = "~/.aeqi"

shared_primer = """
# AEQI

## For Every Task

1. `aeqi_recall(project, query)` — gate-enforced before any edit
2. Load a workflow skill from the list below — it contains all steps including task creation
3. Follow the loaded workflow step by step

Trivial fixes (typos, one-line config): `aeqi_recall` → edit → `aeqi_remember` → done.

## Tools

| Tool | Purpose |
|------|---------|
| `aeqi_recall(project, query)` | Search institutional memory |
| `aeqi_remember(project, key, content, category)` | Store learnings |
| `aeqi_skills(action, name)` | Load domain knowledge and workflows |
| `aeqi_graph(action, project, ...)` | Code structure: search, context, impact, file |
| `aeqi_delegate(agent, project, task_id)` | One-call agent delegation (returns prompt for subagent) |
| `aeqi_notes(action, project, ...)` | Coordination: post findings, claim files, read context |
| `aeqi_create_task(project, subject)` | Track work |
| `aeqi_close_task(task_id)` | Close task (triggers integration check) |
| `aeqi_agents(action, phase)` | Browse available agents by phase |

## Delegation Rules (MANDATORY)

When spawning subagents for research, review, implementation, or any focused work:

1. **Use `aeqi_delegate`** to get the proper agent template — never spawn a raw Agent with an inline prompt
2. **Subagents MUST post findings to notes** — `aeqi_notes(action="post", key="task:{id}:{phase}", ...)`
3. **Read notes after delegation** — `aeqi_notes(action="query", project)` to get subagent findings
4. **Use phase-appropriate agents** — `aeqi_agents(action="list", phase="discover")` to see available templates

Do NOT spawn anonymous agents with ad-hoc prompts. The templates include notes posting instructions, phase-specific skills, and proper tool scoping.

## Rules

- No comments except `///` on public APIs.
- No backward compat hacks. Change everywhere or don't.
- Same concept = same name everywhere.
- DRY. Extract at two, refactor at three.
- Schema = source of truth.
- Worktrees only. Never edit dev/master.
- No secrets in git.
- Full autonomy. BLOCKED = missing credential, unresolvable failure, or competing paths needing human choice. Nothing else.
"""

[web]
enabled = true
bind = "0.0.0.0:8400"
ui_dist_dir = "/home/claudedev/aeqi/apps/ui/dist"
cors_origins = ["https://aeqi.ai", "https://app.aeqi.ai", "http://localhost:5173"]
auth_secret = "${AEQI_WEB_SECRET}"

[providers.openrouter]
api_key = "${OPENROUTER_API_KEY}"
default_model = "google/gemini-2.0-flash-001"
embedding_model = "openai/text-embedding-3-small"

[security]
autonomy = "supervised"
workspace_only = true
max_cost_per_day_usd = 10.0

[memory]
backend = "sqlite"
embedding_dimensions = 1536
vector_weight = 0.6
keyword_weight = 0.4
temporal_decay_halflife_days = 30
mmr_lambda = 0.7
chunk_size_tokens = 400
chunk_overlap_tokens = 80

[repos]
aeqi = "/home/claudedev/aeqi"
aeqi-ui = "/home/claudedev/aeqi/apps/ui"
algostaking = "/home/claudedev/algostaking-backend"
algostaking-app = "/home/claudedev/algostaking-app"
algostaking-frontend = "/home/claudedev/algostaking-frontend"
riftdecks = "/home/claudedev/riftdecks"
entity-legal = "/home/claudedev/aeqi/projects/entity-legal/web"
aeqi-core = "/home/claudedev/aeqi-core"
aeqi-app = "/home/claudedev/aeqi-app"
aeqi-graph = "/home/claudedev/aeqi-graph"
unifutures = "/home/claudedev/unifutures"

[team]
leader = "assistant"
agents = ["assistant"]
router_model = "google/gemini-2.0-flash-001"
router_cooldown_secs = 60
max_background_cost_usd = 0.0

[channels.telegram]
token_secret = "TELEGRAM_BOT_TOKEN"
allowed_chats = [-5229229023]
debounce_window_ms = 3000

[orchestrator]
background_automation_enabled = false
expertise_routing = true
adaptive_retry = false
failure_analysis_model = "google/gemini-2.0-flash-001"
preflight_enabled = false
preflight_model = "google/gemini-2.0-flash-001"
preflight_max_cost_usd = 0.02
infer_deps_threshold = 0.6
notes_transient_ttl_hours = 48
notes_durable_ttl_days = 14

# ── Companies ──

[[companies]]
name = "aeqi"
prefix = "sg"
repo = "/home/claudedev/aeqi"
model = "google/gemini-2.0-flash-001"
max_workers = 2
worktree_root = "/home/claudedev/worktrees"
execution_mode = "agent"
max_turns = 25
worker_timeout_secs = 3600
primer = """
AEQI — Agent runtime, orchestration engine, and web control plane in Rust. 10 crates, 634+ tests.

Crates: aeqi-cli (CLI/MCP), aeqi-core (agent loop, config, identity), aeqi-orchestrator (daemon, worker pools, middleware, departments, notes, dispatch), aeqi-web (Axum REST+WS), aeqi-tasks (task DAG, missions), aeqi-memory (SQLite+FTS5, vector search), aeqi-providers (OpenRouter, Anthropic, Ollama), aeqi-tools (shell, file, git, delegate, skills), aeqi-gates (Telegram, Discord, Slack), aeqi-graph (code intelligence).

4 primitives: Agent (persistent identity with UUID, entity memory, department), Department (org hierarchy, escalation chains), Task (agent-bound, atomic checkout), Delegation (unified delegate tool, 5 response modes).

Middleware chain: 9 layers (guardrails, graph guardrails, loop detection, context compression, context budget, cost tracking, memory refresh, clarification, safety net).

Runtime: daemon patrol loop every 30s. Centralized per-agent spawning with global max_concurrent. Dispatch bus with ACK/retry. Budget policies per scope. Approval queue. Webhook triggers with HMAC signing.
"""
