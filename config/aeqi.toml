[aeqi]
name = "emperor-system"
data_dir = "~/.sigil"

[web]
enabled = true
bind = "0.0.0.0:8400"
ui_dist_dir = "/home/claudedev/aeqi/apps/ui/dist"
cors_origins = ["https://aeqi.ai", "https://app.aeqi.ai", "http://localhost:5173"]
auth_secret = "${AEQI_WEB_SECRET}"

[providers.openrouter]
api_key = "${OPENROUTER_API_KEY}"
default_model = "stepfun/step-3.5-flash:free"
embedding_model = "openai/text-embedding-3-small"

[security]
autonomy = "supervised"
workspace_only = true
max_cost_per_day_usd = 10.0

[memory]
backend = "sqlite"
embedding_dimensions = 1536
vector_weight = 0.6
keyword_weight = 0.4
temporal_decay_halflife_days = 30
mmr_lambda = 0.7
chunk_size_tokens = 400
chunk_overlap_tokens = 80

# Shared primer injected into ALL agents regardless of project.
# shared_primer = "Global context that every agent should know."

# Global repo pool — all agents can access all repos
[repos]
aeqi = "/home/claudedev/aeqi"
aeqi-ui = "/home/claudedev/aeqi/apps/ui"
algostaking = "/home/claudedev/algostaking-backend"
algostaking-app = "/home/claudedev/algostaking-app"
algostaking-frontend = "/home/claudedev/algostaking-frontend"
riftdecks = "/home/claudedev/riftdecks"
entity-legal = "/home/claudedev/aeqi/projects/entity-legal/web"
aeqi-core = "/home/claudedev/aeqi-core"
aeqi-app = "/home/claudedev/aeqi-app"
aeqi-graph = "/home/claudedev/aeqi-graph"
unifutures = "/home/claudedev/unifutures"

# System team — Rei at the helm
[team]
leader = "shadow"
agents = ["shadow"]
router_model = "stepfun/step-3.5-flash:free"
router_cooldown_secs = 60
max_background_cost_usd = 0.0

# Agents discovered from agents/{name}/agent.toml files on disk.
# Active: shadow, engineer, trader, designer, researcher, reviewer

[channels.telegram]
token_secret = "TELEGRAM_BOT_TOKEN"
allowed_chats = [-5229229023]
debounce_window_ms = 3000

# Orchestration tuning — v3 feature activation
[orchestrator]
background_automation_enabled = false
expertise_routing = true
adaptive_retry = false
failure_analysis_model = "stepfun/step-3.5-flash:free"
preflight_enabled = false
preflight_model = "stepfun/step-3.5-flash:free"
preflight_max_cost_usd = 0.02
infer_deps_threshold = 0.6
blackboard_transient_ttl_hours = 48
blackboard_durable_ttl_days = 14

# Projects — each is a product you're building
# AEQI manages itself — dogfooding is how we make it great
[[projects]]
name = "aeqi"
prefix = "sg"
repo = "/home/claudedev/aeqi"
model = "stepfun/step-3.5-flash:free"
max_workers = 2
worktree_root = "/home/claudedev/worktrees"
execution_mode = "agent"
max_turns = 25
worker_timeout_secs = 3600
# primer = """
# AEQI is a persistent agent orchestration platform built in Rust.
# All agents receive this brief when working on the project.
# """
team.leader = "engineer"
team.agents = ["engineer", "reviewer"]

[[projects.departments]]
name = "engineering"
lead = "engineer"
agents = ["engineer", "reviewer"]
description = "Core framework, CLI, daemon, web API"

[[projects.departments]]
