[sigil]
name = "emperor-system"
data_dir = "~/.sigil"

[web]
enabled = true
bind = "0.0.0.0:8400"
cors_origins = ["https://entity.business", "http://localhost:5173"]
auth_secret = "${SIGIL_WEB_SECRET}"

[providers.openrouter]
api_key = "${OPENROUTER_API_KEY}"
default_model = "minimax/minimax-m2.5"
fallback_model = "deepseek/deepseek-v3.2"
embedding_model = "openai/text-embedding-3-small"

[security]
autonomy = "supervised"
workspace_only = true
max_cost_per_day_usd = 10.0

[memory]
backend = "sqlite"
embedding_dimensions = 1536
vector_weight = 0.6
keyword_weight = 0.4
temporal_decay_halflife_days = 30
mmr_lambda = 0.7
chunk_size_tokens = 400
chunk_overlap_tokens = 80

[heartbeat]
enabled = false
default_interval_minutes = 30

# Agent lifecycle engine — autonomous reflection, evolution, proactive scanning
[lifecycle]
enabled = true
model = "minimax/MiniMax-M1"

# Global repo pool — all agents can access all repos
[repos]
sigil = "/home/claudedev/sigil"
sigil-ui = "/home/claudedev/entity-business"
algostaking = "/home/claudedev/algostaking-backend"
algostaking-app = "/home/claudedev/algostaking-app"
algostaking-frontend = "/home/claudedev/algostaking-frontend"
riftdecks = "/home/claudedev/riftdecks"
entity-legal = "/home/claudedev/sigil/projects/entity-legal/web"
aeqi-core = "/home/claudedev/aeqi-core"
aeqi-app = "/home/claudedev/aeqi-app"
aeqi-graph = "/home/claudedev/aeqi-graph"
unifutures = "/home/claudedev/unifutures"

# System team — Rei at the helm
[team]
leader = "rei"
agents = ["rei"]
router_model = "google/gemini-2.0-flash-001"
router_cooldown_secs = 60
max_background_cost_usd = 0.50

# Agents discovered from agents/{name}/agent.toml files on disk.
# Agents discovered from agents/{name}/agent.toml files on disk.
# Active: rei, engineer, trader, designer, researcher, reviewer

[channels.telegram]
token_secret = "TELEGRAM_BOT_TOKEN"
allowed_chats = [-5229229023]
debounce_window_ms = 3000

# Orchestration tuning — v3 feature activation
[orchestrator]
expertise_routing = true
adaptive_retry = true
failure_analysis_model = "minimax/minimax-m2.5"
preflight_enabled = true
preflight_model = "minimax/minimax-m2.5"
preflight_max_cost_usd = 0.02
decomposition_model = "minimax/minimax-m2.5"
auto_redecompose = true
infer_deps_threshold = 0.6
blackboard_transient_ttl_hours = 48
blackboard_durable_ttl_days = 14

# Watchdog rules — event-driven automation
[[watchdogs]]
name = "sigil-self-failure"
cooldown_secs = 7200
enabled = true
[watchdogs.condition]
event = "task_failed"
project_filter = "sigil"
count_threshold = 2
window_secs = 3600
[watchdogs.action.escalate]
message = "2+ task failures in sigil project — the orchestrator needs attention"

# Algostaking cron jobs: service-heartbeat (5m), pnl-tracker (10m),
# accuracy-watchdog (15m), health-monitor (30m), training-progress (1h),
# improvement-cycle (2h), morning-report (8:57am), daily-pnl (midnight),
# weekend-deep-review (Sat 10:17am)

# Algostaking reactive watchdogs
[[watchdogs]]
name = "algostaking-task-failure"
cooldown_secs = 1800
enabled = true
[watchdogs.condition]
event = "task_failed"
project_filter = "algostaking"
count_threshold = 2
window_secs = 3600
[watchdogs.action.escalate]
message = "2+ algostaking task failures in 1 hour — check services and ML pipeline"

[[watchdogs]]
name = "algostaking-worker-timeout"
cooldown_secs = 3600
enabled = true
[watchdogs.condition]
event = "worker_timeout"
project_filter = "algostaking"
count_threshold = 1
window_secs = 1800
[watchdogs.action.escalate]
message = "Algostaking worker timed out — possible stuck inference or training loop"

[[watchdogs]]
name = "budget-warning"
cooldown_secs = 14400
enabled = true
[watchdogs.condition]
event = "budget_threshold_reached"
count_threshold = 1
window_secs = 86400
budget_threshold = 0.8
[watchdogs.action.escalate]
message = "Budget usage exceeded 80%"

[[watchdogs]]
name = "general-timeout-alert"
cooldown_secs = 3600
enabled = true
[watchdogs.condition]
event = "worker_timeout"
count_threshold = 3
window_secs = 1800
[watchdogs.action.escalate]
message = "3+ worker timeouts across projects in 30 minutes"

# Projects — each is a product you're building
# Sigil manages itself — dogfooding is how we make it great
[[projects]]
name = "sigil"
prefix = "sg"
repo = "/home/claudedev/sigil"
model = "claude-opus-4-6"
max_workers = 2
worktree_root = "/home/claudedev/worktrees"
execution_mode = "claude_code"
max_turns = 25
worker_timeout_secs = 3600
team.leader = "engineer"
team.agents = ["engineer", "reviewer"]

[[projects.departments]]
name = "engineering"
lead = "engineer"
agents = ["engineer", "reviewer"]
description = "Core framework, CLI, daemon, web API"

[[projects.departments]]
name = "product"
lead = "designer"
agents = ["designer"]
description = "Web dashboard, UX, landing page"

