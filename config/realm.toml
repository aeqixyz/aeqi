[realm]
name = "emperor-realm"
data_dir = "~/.sigil"

[providers.openrouter]
api_key = "${OPENROUTER_API_KEY}"
default_model = "minimax/minimax-m2.5"
fallback_model = "deepseek/deepseek-v3.2"
embedding_model = "openai/text-embedding-3-small"

[security]
autonomy = "supervised"
workspace_only = true
max_cost_per_day_usd = 10.0

[memory]
backend = "sqlite"
embedding_dimensions = 1536
vector_weight = 0.6
keyword_weight = 0.4
temporal_decay_halflife_days = 30
mmr_lambda = 0.7
chunk_size_tokens = 400
chunk_overlap_tokens = 80

[pulse]
enabled = false
default_interval_minutes = 30

[shadow]
prefix = "fa"
model = "claude-opus-4-6"
max_workers = 2
execution_mode = "claude_code"    # full Claude Code harness with Opus

# Multi-familiar council
[[familiars]]
name = "aurelia"
prefix = "fa"
model = "claude-opus-4-6"
role = "lead"
telegram_token_secret = "TELEGRAM_BOT_TOKEN"

[[familiars]]
name = "kael"
prefix = "fk"
model = "claude-opus-4-6"
role = "advisor"
domains = ["algostaking"]
telegram_token_secret = "KAEL_TELEGRAM_TOKEN"

[[familiars]]
name = "mira"
prefix = "fm"
model = "claude-sonnet-4-6"
role = "advisor"
domains = ["riftdecks", "entity-legal"]
telegram_token_secret = "MIRA_TELEGRAM_TOKEN"

[[familiars]]
name = "void"
prefix = "fv"
model = "claude-sonnet-4-6"
role = "advisor"
domains = ["gacha-agency"]
telegram_token_secret = "VOID_TELEGRAM_TOKEN"

[council]
max_advisor_cost_usd = 0.50
advisor_cooldown_secs = 60

[channels.telegram]
token_secret = "TELEGRAM_BOT_TOKEN"
allowed_chats = [-5229229023]
debounce_window_ms = 3000

[[domains]]
name = "gacha-agency"
prefix = "ga"
repo = "/home/claudedev/sigil"
model = "claude-sonnet-4-6"
max_workers = 2
execution_mode = "claude_code"    # full Claude Code harness
spirit_timeout_secs = 1800        # 30 minutes

[[domains]]
name = "algostaking"
prefix = "as"
repo = "/home/claudedev/algostaking-backend"
model = "claude-sonnet-4-6"
max_workers = 3
worktree_root = "/home/claudedev/worktrees"
execution_mode = "claude_code"
max_turns = 25
spirit_timeout_secs = 3600        # 1 hour for complex code tasks

[[domains]]
name = "riftdecks"
prefix = "rd"
repo = "/home/claudedev/riftdecks"
model = "claude-sonnet-4-6"
max_workers = 2
execution_mode = "claude_code"
spirit_timeout_secs = 1800        # 30 minutes

[[domains]]
name = "entity-legal"
prefix = "el"
repo = "/home/claudedev/entity-legal"
model = "claude-sonnet-4-6"
max_workers = 2
execution_mode = "claude_code"
spirit_timeout_secs = 1800        # 30 minutes
