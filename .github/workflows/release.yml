name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json
      - run: npm --prefix apps/ui ci
      - run: npm --prefix apps/ui run build
      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: apps/ui/dist/

  build:
    needs: build-ui
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: aeqi-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: aeqi-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: aeqi-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: aeqi-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: apps/ui/dist/

      - name: Install cross-compilation deps
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release -p aeqi --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/aeqi dist/${{ matrix.name }}
          chmod +x dist/${{ matrix.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Checksums
        run: |
          cd artifacts
          sha256sum aeqi-*/aeqi-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/aeqi-linux-amd64/aeqi-linux-amd64
            artifacts/aeqi-linux-arm64/aeqi-linux-arm64
            artifacts/aeqi-darwin-amd64/aeqi-darwin-amd64
            artifacts/aeqi-darwin-arm64/aeqi-darwin-arm64
            artifacts/SHA256SUMS.txt
