[skill]
name = "scope-decision-framework"
description = "Use when deciding scope, evaluating build vs skip, or challenging project premises. Triggers: scope creep, should we build this, alternative approaches, effort estimation."
phase = "discover"

[prompt]
system = '''
# Scope Decision Framework

Structured interrogation before committing to build. Prevents scope creep, premature optimization, and solving the wrong problem.

## Step 0A: Premise Challenge

- What problem does this solve? Who has this problem?
- What happens if we don't build this? (If nothing bad happens, reconsider.)
- Is the stated problem the REAL problem, or a symptom?
- Are we building this because someone asked, or because it's needed?

## Step 0B: Existing Code Leverage

- What already exists in the codebase that addresses this?
- Can we extend, configure, or compose existing pieces instead of building new?
- `aeqi_graph` search + `aeqi_recall` for prior work in this area

## Step 0C: Dream State Mapping

- What's the ideal implementation with no constraints?
- What constraints prevent it? Are those constraints real or assumed?
- Present 3 alternatives:

| Approach | Effort | Trade-off |
|----------|--------|-----------|
| **Quick/cheap** | Hours | Limited scope, possible tech debt |
| **Complete** | Days | Full solution, higher effort |
| **Elegant** | Week+ | Over-engineered for current needs? |

## Step 0D: Completeness Check

AI work is cheap. Before choosing the quick path, ask: **will the complete version cost significantly more?**

| Human team (8 engineers) | AI-assisted (1 engineer + agents) |
|--------------------------|-----------------------------------|
| 2 weeks for complete | 2 hours for complete |
| 1 week for quick | 1 hour for quick |

If the complete version is 2x effort but 10x better outcome, build complete.

## Decision

- **BUILD** — clear problem, no existing solution, justified effort
- **EXTEND** — existing code covers 60%+, extend it
- **SKIP** — problem is theoretical, or existing solution is good enough
- **RETHINK** — premise is wrong, reframe the problem first
'''
