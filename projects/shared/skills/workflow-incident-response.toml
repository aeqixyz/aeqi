[skill]
name = "workflow-incident-response"
description = "Use when a system is down, degraded, or behaving unexpectedly. Triggers: outage, error spike, degraded performance, alert firing, system down."
phase = "workflow"

[prompt]
system = '''
# Incident Response Workflow

Triage → Mitigate → Diagnose → Fix → Postmortem. The priority is ALWAYS to stop the bleeding first.

```
Triage → Mitigate → Diagnose → Fix → Postmortem
```

---

## Phase 1: Triage (< 5 minutes)

1. **What's the blast radius?** — who/what is affected? Users? Data? Revenue?
2. **When did it start?** — check logs, metrics, recent deploys
3. **Is it getting worse?** — trending up = urgent. Stable = less urgent.
4. **Severity classification:**

| Severity | Criteria | Response |
|----------|----------|----------|
| **SEV1** | Full outage, data loss risk, revenue impact | All hands, immediate |
| **SEV2** | Degraded service, partial outage | Dedicated responder, < 1 hour |
| **SEV3** | Minor issue, workaround exists | Next available, < 4 hours |

---

## Phase 2: Mitigate (BEFORE diagnosing)

<HARD-GATE>
Stop the bleeding before you understand the cause. Rollback, redirect, scale, or drain. Diagnosis comes AFTER mitigation.
</HARD-GATE>

1. **Can we rollback?** — revert last deploy. If yes, do it NOW.
2. **Can we redirect?** — route traffic away from the broken component
3. **Can we scale?** — add capacity if the issue is load-related
4. **Can we drain?** — gracefully remove the broken node from the pool

---

## Phase 3: Diagnose

1. **Timeline** — what happened, in what order? Correlate deploy times with error onset.
2. **Logs** — search for errors, exceptions, panic traces in the affected timeframe
3. **Metrics** — CPU, memory, disk, network, latency, error rate. What changed?
4. **Recent changes** — git log, config changes, dependency updates, infrastructure changes
5. **Root cause** — not "the server crashed" but "the server crashed because X caused Y which triggered Z"

---

## Phase 4: Fix

1. **Targeted fix** — address the root cause, not symptoms
2. **Verify** — confirm the fix resolves the issue (metrics return to baseline)
3. **Monitor** — watch for 15+ minutes after fix to confirm stability
4. **Communicate** — update stakeholders on resolution

---

## Phase 5: Postmortem

1. **Timeline** — minute-by-minute reconstruction
2. **Root cause** — technical cause + contributing factors
3. **What went well** — detection, response, communication
4. **What went wrong** — gaps in monitoring, slow detection, missing runbooks
5. **Action items** — concrete preventive measures with owners and deadlines
6. **Store** — `aeqi_remember` the incident pattern for future recognition

---

## Anti-Rationalization Table

| Excuse | Reality |
|--------|---------|
| "Let me understand the cause first" | Mitigate first. Understanding doesn't help users who are down NOW. |
| "The rollback might cause other issues" | A known-good state beats an unknown-bad state. Rollback. |
| "It's probably transient" | "Probably" means you haven't checked. Check. |
| "We don't need a postmortem for this" | Every incident teaches something. Write it down. |
'''
