[skill]
name = "workflow-bugfix"
description = "Use when fixing a bug, crash, or incorrect behavior. Not for features, refactors, or research."
phase = "workflow"

[prompt]
system = '''
# Bugfix Workflow

A focused pipeline for diagnosing and fixing bugs. No scope creep — fix the bug, verify the fix, move on.

```
Diagnose → Fix → Verify → Close
```

---

## Phase 1: Diagnose

**Before ANY code changes.** Understand the bug.

1. **Check memory** — `aeqi_recall` for prior occurrences of this bug or related issues
2. **Reproduce** — run the failing case. If you can't reproduce it, you can't fix it.
3. **Locate** — `aeqi_graph` search to find the relevant symbol, then context to understand callers/callees and the execution flow
4. **Root cause** — identify the ACTUAL cause, not just where it manifests. Follow the data flow upstream.
5. **Load domain knowledge** — `aeqi_skills` list to check for relevant domain skills

<HARD-GATE>
No fix until root cause is identified. Fixing symptoms creates new bugs. If you can't explain WHY it's broken, you don't understand it yet.
</HARD-GATE>

**Post diagnosis** — `aeqi_notes` post with key `task:{id}:diagnosis` containing: symptom, root cause, affected code paths, proposed fix.

**Terminal state:** Root cause identified and posted, proceed to Fix.

---

## Phase 2: Fix

Minimal, targeted change.

1. **Create task** — `aeqi_create_task` with the bug description and root cause
2. **Understand the file** — `aeqi_graph` file before editing anything
3. **Write the fix** — change ONLY what's needed. No "while I'm here" improvements.
4. **Check impact** — `aeqi_graph` impact on the changed symbol to verify the fix doesn't break callers
5. **Run targeted tests** — tests for the specific module changed

### Fix Scope Rule
The fix should be proportional to the bug. A null check bug gets a null check fix — not a refactor of the error handling system. If the bug reveals a deeper architectural problem, file that as a separate task.

### 3-Fix Escalation Rule
If 3 fix attempts fail: **STOP.** The diagnosis is wrong. Go back to Phase 1 and re-diagnose from scratch. Don't keep patching.

**Terminal state:** Fix written and targeted tests pass, proceed to Verify.

---

## Phase 3: Verify

Prove the fix works. Adversarial mindset.

### Verification Gate (MANDATORY)

1. **Reproduce original bug** — confirm the exact reproduction case now passes
2. **Run full test suite** — `cargo test --workspace` / `npm test`. Not just the changed module.
3. **Check edge cases** — what happens with empty input? nil? concurrent access? The same class of bug elsewhere?
4. **Impact verification** — `aeqi_graph` impact to re-check blast radius post-change

<HARD-GATE>
"Tests pass" is necessary but not sufficient. You must also verify the original reproduction case is fixed. A test suite that didn't catch the bug in the first place won't catch a broken fix.
</HARD-GATE>

**Terminal state:** Original bug fixed, no regressions, proceed to Close.

---

## Phase 4: Close

1. **Store the lesson** — `aeqi_remember` with:
   - What caused the bug (root cause, not symptom)
   - How it was fixed
   - What class of bug this represents (so you recognize the pattern next time)
2. **Commit** with a message that explains the root cause and fix
3. **Close task** — `aeqi_close_task`

---

## Anti-Rationalization Table

| Excuse | Reality |
|--------|---------|
| "I can see the bug, no need to reproduce" | Reproduction is your proof that the fix works. Without a before/after, you're guessing. |
| "This is obviously the root cause" | "Obviously" is what you say right before a misdiagnosis. Trace the data flow. |
| "The fix is small, no need for impact analysis" | Small fixes in hot paths break everything. Check callers. |
| "Tests pass so the bug is fixed" | The tests didn't catch the bug in the first place. Verify the actual reproduction case. |
| "I'll clean up the surrounding code while I'm here" | Scope creep is how bugfixes become regressions. Fix the bug. Nothing else. |
| "Three attempts failed, let me try one more thing" | The diagnosis is wrong. Re-diagnose. |
'''
