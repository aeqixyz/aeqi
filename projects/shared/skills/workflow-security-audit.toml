[skill]
name = "workflow-security-audit"
description = "Use when auditing security posture, reviewing for vulnerabilities, or assessing threat surface. Triggers: security review, vulnerability scan, threat model, OWASP check, penetration test prep."
phase = "workflow"

[prompt]
system = '''
# Security Audit Workflow

Systematic security assessment: identify threats, scan for vulnerabilities, prioritize remediation.

```
Scope → Threat Model → Vulnerability Scan → Risk Assessment → Remediation Plan → Close
```

---

## Phase 1: Scope

1. **Identify tech stack** — languages, frameworks, databases, APIs, third-party services
2. **Map attack surface** — public endpoints, auth boundaries, data flows, trust zones
3. **Classify data sensitivity** — PII, credentials, financial, medical, public
4. **Set audit intensity:**
   - **Quick (daily)** — confidence gate 8/10, zero-noise, critical vulns only
   - **Comprehensive (monthly)** — confidence gate 2/10, deep scan, all findings

---

## Phase 2: Threat Model (STRIDE)

For each component in the attack surface:

| Threat | Question | Check |
|--------|----------|-------|
| **Spoofing** | Can an attacker impersonate a user or service? | Auth mechanisms, token validation, certificate pinning |
| **Tampering** | Can data be modified in transit or at rest? | Input validation, checksums, signed payloads |
| **Repudiation** | Can actions be denied? | Audit logs, timestamps, non-repudiation controls |
| **Info Disclosure** | Can sensitive data leak? | Error messages, logs, API responses, headers |
| **Denial of Service** | Can the system be overwhelmed? | Rate limits, resource caps, circuit breakers |
| **Elevation of Privilege** | Can a user gain unauthorized access? | RBAC, least privilege, permission checks |

Post findings: `aeqi_notes` post with key `task:{id}:threat-model`

---

## Phase 3: Vulnerability Scan

Check against OWASP Top 10:

1. **Injection** — SQL, command, LDAP, XSS, template injection
2. **Broken Auth** — weak passwords, missing MFA, session fixation
3. **Sensitive Data Exposure** — unencrypted storage, leaked secrets in logs/git
4. **XML External Entities** — XXE in parsers
5. **Broken Access Control** — IDOR, missing authorization checks, path traversal
6. **Security Misconfiguration** — default credentials, verbose errors, open ports
7. **XSS** — reflected, stored, DOM-based
8. **Insecure Deserialization** — untrusted object reconstruction
9. **Known Vulnerabilities** — outdated dependencies, CVEs
10. **Insufficient Logging** — missing audit trail, no alerting

Additional checks:
- **Secrets archaeology** — grep for API keys, tokens, passwords in code and git history
- **Dependency supply chain** — check lock files for known vulnerable versions
- **CI/CD pipeline** — secrets in env vars, unsigned artifacts, writable pipelines

---

## Phase 4: Risk Assessment

For each finding, score:

| Severity | Criteria | Action |
|----------|----------|--------|
| **Critical** | Exploitable now, data loss or system compromise | Fix immediately |
| **High** | Exploitable with effort, significant impact | Fix this sprint |
| **Medium** | Requires specific conditions, moderate impact | Fix next sprint |
| **Low** | Theoretical risk, minimal impact | Track and review |

Post: `aeqi_notes` post with key `task:{id}:risk-assessment`

---

## Phase 5: Remediation Plan

For each Critical/High finding:
1. **Root cause** — what allowed this vulnerability
2. **Fix** — specific code/config changes needed (file paths, function names)
3. **Verification** — how to confirm the fix works
4. **Prevention** — what process/tool prevents recurrence

---

## Phase 6: Close

1. **Store findings** — `aeqi_remember` threat model and key vulnerabilities for future reference
2. **Track trends** — compare with previous audits if available
3. **Close task** — `aeqi_close_task`
'''
