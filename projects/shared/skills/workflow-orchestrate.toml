[skill]
name = "workflow-orchestrate"
description = "Use when decomposing work across multiple parallel agents. Triggers: parallel execution, multi-agent task, orchestrator pattern, fan-out delegation."
phase = "workflow"

[prompt]
system = '''
# Orchestration Workflow

Decompose work into independent units, delegate to parallel workers, aggregate results. For tasks too large or diverse for a single agent.

```
Discover → Plan → Delegate → Aggregate → Report
```

---

## Phase 1: Discover

1. **Articulate the REAL goal** — one sentence describing the outcome, not the process
2. **Identify work units** — each unit must be independently completable
3. **Check independence** — if unit A needs unit B's output, they're not independent. Serialize them.
4. **Size units** — each should take 5-15 minutes of agent work. Split larger units.

---

## Phase 2: Plan

1. **Assign worker type per unit** — explorer, implementer, reviewer, verifier
2. **Build worker prompts** — each gets: goal, context, constraints. NEVER reference other workers.
3. **Set budget per worker** — `max_iterations` allocated from parent's pool

### Worker Independence Rule
Workers receive context from the orchestrator. They NEVER:
- Reference other workers' tasks or output
- Wait for another worker to complete
- Share state with peers during execution

If workers need shared state, the orchestrator mediates via notes between phases.

---

## Phase 3: Delegate

1. **Fan out** — `aeqi_delegate` with each worker in parallel (async mode)
2. **Track** — post to `aeqi_notes` key `task:{id}:workers` with worker IDs and status
3. **Monitor** — as workers complete, read their findings from notes

### Scaling Rules
- **1-3 workers** — orchestrate directly
- **4-7 workers** — add progress tracking, expect 10-15 min total
- **8+ workers** — add a tier: sub-orchestrators for groups of 3-5

<HARD-GATE>
Never overload a single orchestrator with 8+ parallel workers. Add hierarchy instead. Worker pool bottleneck degrades quality at 5+ direct reports.
</HARD-GATE>

---

## Phase 4: Aggregate

1. **Collect results** — `aeqi_notes` query for all `task:{id}:worker:*` entries
2. **Merge** — combine findings, deduplicate, resolve conflicts
3. **Synthesize** — the orchestrator must UNDERSTAND and RESTATE findings, not pass through. Lazy delegation (forwarding without synthesis) is a failure.

---

## Phase 5: Report

1. **Summary** — what was accomplished across all workers
2. **Conflicts** — where workers disagreed, orchestrator's resolution and reasoning
3. **Gaps** — what wasn't covered, what needs follow-up
4. **Store** — `aeqi_remember` key findings

---

## Anti-Rationalization Table

| Excuse | Reality |
|--------|---------|
| "One agent can handle this" | If it touches 5+ files in different modules, parallelize. |
| "I'll just do them sequentially" | Sequential wastes context. Fresh workers = fresh context = better quality. |
| "Workers can coordinate directly" | No. Workers are independent. Orchestrator mediates. |
| "I'll forward the worker's output" | Synthesis is your job. Understand it, restate it, add judgment. |
| "8 workers is fine" | Worker pool bottleneck is real. Add a tier at 5+. |
'''
