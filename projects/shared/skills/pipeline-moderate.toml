[skill]
name = "pipeline-moderate"
description = "R→D→R pipeline orchestrator — Research, Develop, Review with Claude Code subagents"
triggers = ["pipeline:moderate"]

[tools]
allow = ["shell", "read_file", "list_dir", "write_file", "edit_file"]

[prompt]
system = """You are executing a MODERATE complexity task using the R→D→R pipeline.
You MUST complete all 3 phases. Skipping research leads to pattern violations.

## Phase 1: Research (Explore subagent)

Spawn an Explore subagent to map the relevant code BEFORE writing anything:

```
Agent tool:
  subagent_type: "Explore"
  description: "Research for <task>"
  prompt: |
    CONTEXT: <what you know about the task>
    OBJECTIVE: Find all files, patterns, and constraints relevant to this task.
    SCOPE: <which directories/services to focus on>
    OUTPUT:
    - Key Files: file:line references to code that will be modified or referenced
    - Patterns: how similar functionality is implemented elsewhere
    - Constraints: invariants, naming conventions, DRY opportunities
    - Recommendation: implementation approach (which files, what order)
```

Read the research output carefully before proceeding.

## Phase 2: Develop (worktree)

1. Create worktree:
   ```bash
   cd <repo_root>
   git worktree add ~/worktrees/feat/<name> -b feat/<name>
   ```

2. Implement changes in the worktree following research findings:
   - Follow existing patterns EXACTLY
   - NO COMMENTS (except //! and /// on public APIs)
   - NO backward compat hacks
   - DRY — use shared modules

3. Build must pass:
   ```bash
   cd ~/worktrees/feat/<name>
   cargo build --release -p <affected-packages>
   cargo test -p <affected-packages>
   ```

4. Commit with descriptive message (feat:, fix:, chore:)

## Phase 3: Review (Explore subagent)

Spawn a review subagent to check your work:

```
Agent tool:
  subagent_type: "Explore"
  description: "Review changes"
  prompt: |
    REVIEW changes in ~/worktrees/feat/<name> against the main branch.
    Run: git diff dev...HEAD in the worktree.
    CHECKLIST:
    - Security: no secrets, no client-side trust
    - Correctness: edge cases handled, no silent failures, error propagation
    - Patterns: follows codebase conventions, consistent naming
    - Quality: no dead code, DRY, no unnecessary abstractions
    - Safety: no unwrap() in production paths, proper error handling
    OUTPUT: PASS or FAIL with specific file:line issues.
```

**If FAIL:** Fix the issues and re-run review (max 2 iterations).
**If PASS:** Proceed to merge.

## Phase 4: Merge & Cleanup

```bash
cd <repo_root>
git checkout dev && git merge feat/<name>
git worktree remove ~/worktrees/feat/<name>
git branch -d feat/<name>
```

## Completion

Report with:
- Files changed (with brief description of each change)
- Commit hash
- Review verdict
- Any decisions made during implementation

DONE: <summary of what was implemented and why>
"""
user_prefix = "Implement (R→D→R): "
