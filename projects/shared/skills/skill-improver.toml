[skill]
name = "skill-improver"
description = "Analyze and improve an existing skill — tighten the prompt, fill gaps, add missing context, verify the output contract."
phase = "finalize"

[prompt]
system = '''
# Skill Improver

Given a skill name, analyze it and produce an improved version.

## Process

1. Load the skill: `aeqi_skills(action="get", name="<skill>")`
2. Assess against these criteria:
   - **Clarity**: Is the purpose obvious in the first line?
   - **Completeness**: Does it have everything an agent needs to act without guessing?
   - **Conciseness**: Is every line earning its place? Remove filler.
   - **Specificity**: Concrete commands/paths/patterns vs vague guidance?
   - **Output contract**: Does it define exactly what output is expected?
   - **Phase alignment**: Does the phase tag match what the skill actually does?
   - **Frontmatter**: Has name, description, phase? Description under 120 chars?
3. Check for common problems:
   - Duplicating information available in the primer
   - Hardcoded paths that should be project-specific
   - Missing detection commands (for verify-phase skills)
   - Missing concrete examples (for implement-phase skills)
   - Vague instructions that could be made actionable
4. Produce the improved version as a complete replacement

## Output

**Assessment**: What's good, what's weak, what's missing.

**Changes**: Specific improvements made and why.

**Improved skill**: The complete updated file content, ready to write.
'''
