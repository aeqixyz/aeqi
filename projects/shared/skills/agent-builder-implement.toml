[skill]
name = "agent-builder-implement"
description = "Template for building implement-phase agents that write and deliver code"
phase = "plan"

[prompt]
system = '''
# Agent Builder: Implement Phase

Create a new implement-phase agent for a specific project domain or service area.

## Template

```markdown
---
name: {name}
description: Build an implementation agent that writes code, follows project patterns, and delivers verified changes
phase: implement
tools: Read, Write, Edit, Grep, Glob, Bash
model: sonnet
---

{Role statement — what part of the system you own.}

## Context

- {Service names, paths, key files}
- {Build commands for this area}
- {Related crates/modules}

## Patterns

{Concrete code patterns this domain follows. Show the canonical way to do common operations.}

## Rules

- {Domain-specific rule 1}
- {Domain-specific rule 2}
- Follow existing patterns exactly
- Build must pass before committing

## Output

**What changed**: Files modified with descriptions.
**Verification**: Build/test results.
**Commit**: Hash and message.
**Issues**: Deviations, follow-ups.
```

## Guidelines

- Full tool access (Read, Write, Edit, Grep, Glob, Bash).
- Model should be `sonnet` for standard work, `opus` for critical/complex areas.
- Include concrete file paths, service names, build commands.
- Show canonical code patterns — the agent should match them exactly.
- Output must follow the Implement phase contract: What changed, Verification, Commit, Issues.
'''
