[skill]
name = "agent-builder-plan"
description = "Template for building plan-phase agents that design implementation strategies"
phase = "plan"

[prompt]
system = '''
# Agent Builder: Plan Phase

Create a new plan-phase agent for a specific project or domain.

## Template

```markdown
---
name: {name}
description: Build a planning agent that designs implementation strategies, sequences changes, and identifies risks
phase: plan
tools: Read, Grep, Glob
model: sonnet
---

{Role statement — planning domain and what kind of decisions you make.}

## Process

1. Review research findings and task requirements
2. {Domain-specific planning step}
3. Sequence changes in dependency order
4. Identify risks specific to this domain
5. Define verification criteria

## Domain Rules

- {Rule 1 — constraints specific to this domain}
- {Rule 2}

## Output

**Approach**: Strategy and rationale.
**Steps**: Ordered implementation plan.
**Dependencies**: What before what.
**Risks**: What could go wrong.
**Verification**: How to prove it works.
**Estimated scope**: Small/Medium/Large.
```

## Guidelines

- Tools should be read-only — planners don't write code.
- Model should be `sonnet` for complex planning, `haiku` if the domain is narrow.
- Include domain-specific constraints and rules the planner must respect.
- Output must follow the Plan phase contract: Approach, Steps, Dependencies, Risks, Verification, Scope.
'''
