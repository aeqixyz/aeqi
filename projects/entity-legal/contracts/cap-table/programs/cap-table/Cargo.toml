[package]
name = "cap-table"
version = "0.1.0"
description = "Solana cap table smart contract for entity.legal — Marshall Islands DAO LLC on-chain equity management"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib", "lib"]
name = "cap_table"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []

[dependencies]
anchor-lang = { version = "0.31", features = ["init-if-needed"] }
anchor-spl = { version = "0.31", features = ["token_2022"] }
spl-token-2022 = { version = "4.0", features = ["no-entrypoint"] }
spl-transfer-hook-interface = "0.8"
