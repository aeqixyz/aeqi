[package]
name = "transfer-hook"
version = "0.1.0"
description = "Transfer hook program for entity.legal cap table — enforces KYC, accreditation, lock-up, and ROFR restrictions"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib", "lib"]
name = "transfer_hook"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []

[dependencies]
anchor-lang = { version = "0.31" }
anchor-spl = { version = "0.31", features = ["token_2022"] }
spl-token-2022 = { version = "4.0", features = ["no-entrypoint"] }
spl-transfer-hook-interface = "0.8"
