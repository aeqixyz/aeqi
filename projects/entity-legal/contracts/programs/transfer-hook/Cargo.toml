[package]
name = "transfer-hook"
version = "0.1.0"
description = "Transfer hook program for entity.legal — enforces 25% KYC threshold, restricted person checks, and membership validation"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib", "lib"]
name = "transfer_hook"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []

[dependencies]
anchor-lang = { version = "0.30" }
anchor-spl = { version = "0.30", features = ["token-2022"] }
spl-token-2022 = { version = "3.0", features = ["no-entrypoint"] }
spl-transfer-hook-interface = "0.7"
spl-tlv-account-resolution = "0.7"
